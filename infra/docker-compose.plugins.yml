# Optional plugin overlay.
#
# Usage:
#   docker compose \
#     -f infra/docker-compose.yml \
#     -f infra/docker-compose.plugins.yml \
#     up -d
#
# Each plugin block is independently uncomment-able — pick the ones you
# want. They all pull from ghcr.io/squat-collective/rat-plugin-<name>,
# which the publish-plugins CI workflow keeps updated from main.
#
# Pin a specific version by replacing `:latest` with `:0.1.0`, etc.
# (Per-plugin tags are published when a `plugin-<name>-v0.1.0` git tag
# is pushed.)
#
# Required for every plugin:
#   - networks: [infra_default] so the plugin can reach ratd
#   - RATD_URL  (public ratd API for catalog reads/writes)
#   - RATD_INTERNAL_URL  (registration + heartbeat — the internal
#     listener that doesn't go through auth)
#
# Many plugins also need Nessie + S3 creds — copy those env blocks
# straight from infra/docker-compose.yml's existing ratd / runner
# services to keep them in sync.

services:
  # ── Iceberg small-file detector + rewriter ────────────────────
  # compaction:
  #   image: ghcr.io/squat-collective/rat-plugin-compaction:latest
  #   container_name: compaction
  #   restart: unless-stopped
  #   depends_on:
  #     ratd: { condition: service_healthy }
  #   networks: [infra_default]
  #   environment:
  #     RATD_URL: http://ratd:8080
  #     RATD_INTERNAL_URL: http://ratd:8090
  #     NESSIE_URL: http://nessie:19120
  #     S3_ENDPOINT: http://minio:9000
  #     S3_ACCESS_KEY: minioadmin
  #     S3_SECRET_KEY: minioadmin
  #     S3_BUCKET: rat
  #     COMPACT_INTERVAL_SECS: "600"
  #     COMPACT_TARGET_FILE_BYTES: "16777216"  # 16 MiB
  #     COMPACT_MIN_FILE_COUNT: "50"
  #     COMPACT_RATIO: "0.3"
  #     COMPACT_AUTO: "true"

