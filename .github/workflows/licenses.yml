# RAT — Third-Party License Report
# Generates license notices for all dependencies across all packages.
# Runs weekly and on every release tag to keep reports fresh.
# On schedule/manual: creates a PR with updated reports.
# On release tags: attaches THIRD-PARTY-NOTICES.md as a release asset.

name: Licenses

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  push:
    tags: ["v*"]
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write  # push regenerated notices to the default branch

jobs:
  generate:
    name: Generate License Reports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # ── Go setup ──
      - uses: actions/setup-go@v7
        with:
          go-version: "1.24"
          cache-dependency-path: platform/go.sum

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      # ── Python setup ──
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install Python tools + deps
        run: |
          pip install --quiet pip-licenses
          cd runner && pip install --quiet -e . && cd ..
          cd query && pip install --quiet -e . && cd ..

      # ── Node setup ──
      - uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: Install Node tools + deps
        run: |
          npm install -g license-checker
          cd sdk-typescript && npm ci && cd ..
          cd portal && npm ci && cd ..
          cd website && npm ci && cd ..

      # ── Generate ──
      - name: Generate license reports
        run: bash scripts/generate-licenses.sh

      # ── Upload artifacts ──
      - name: Upload license reports
        uses: actions/upload-artifact@v7
        with:
          name: license-reports
          path: |
            THIRD-PARTY-NOTICES.md
            platform/THIRD-PARTY-NOTICES.md
            runner/THIRD-PARTY-NOTICES.md
            query/THIRD-PARTY-NOTICES.md
            portal/THIRD-PARTY-NOTICES.md
            sdk-typescript/THIRD-PARTY-NOTICES.md
            website/THIRD-PARTY-NOTICES.md
            website/data/licenses.json
          retention-days: 90

      # ── Commit updated reports directly (schedule/manual only) ──
      # GitHub Actions can't open PRs in this repo (the org/repo setting
      # "Allow GitHub Actions to create and approve pull requests" is off), so
      # we commit the regenerated notices straight to the default branch.
      # [skip ci] keeps a notices-only refresh from triggering the full CI +
      # plugin-publish suite (those would rebuild everything for doc text).
      - name: Commit updated license reports
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            THIRD-PARTY-NOTICES.md \
            platform/THIRD-PARTY-NOTICES.md \
            runner/THIRD-PARTY-NOTICES.md \
            query/THIRD-PARTY-NOTICES.md \
            portal/THIRD-PARTY-NOTICES.md \
            sdk-typescript/THIRD-PARTY-NOTICES.md \
            website/THIRD-PARTY-NOTICES.md \
            website/data/licenses.json
          if git diff --cached --quiet; then
            echo "No license changes — nothing to commit."
          else
            git commit -m "chore(licenses): update third-party license reports [skip ci]"
            # This commit goes straight to the default branch, so a PR merge that
            # lands between checkout and push rejects it ("fetch first"). Rebase
            # onto the latest main and retry a few times before giving up.
            n=0
            until git push origin "HEAD:${GITHUB_REF_NAME}"; do
              n=$((n + 1))
              if [ "$n" -ge 5 ]; then
                echo "push still rejected after $n attempts — giving up"
                exit 1
              fi
              echo "push rejected (branch advanced) — rebasing and retrying ($n)…"
              git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            done
          fi

      # ── Attach to release (tag push only) ──
      - name: Attach THIRD-PARTY-NOTICES.md to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: THIRD-PARTY-NOTICES.md
