# RAT v2 — Continuous Integration
# Runs on every push and on all pull requests.
# Jobs run in parallel; each sets up its own language toolchain
# for speed and proper GitHub Actions caching.

name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go Tests (platform/) ──────────────────────────────────────
  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: platform/go.sum

      - name: Run tests
        run: go test -v -race -count=1 ./...

  # ── Python Tests (runner/) ────────────────────────────────────
  test-py-runner:
    name: Python Tests (runner)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runner
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv pip install --system -e '.[dev]'

      - name: Run tests
        run: pytest -v

  # ── Python Tests (query/) ─────────────────────────────────────
  test-py-query:
    name: Python Tests (query)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: query
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv pip install --system -e '.[dev]'

      - name: Run tests
        run: pytest -v

  # ── TypeScript Tests (sdk-typescript/ + portal/) ──────────────
  test-ts:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: |
            sdk-typescript/package-lock.json
            portal/package-lock.json

      # Build + lint + test SDK first (portal depends on it)
      - name: Install SDK dependencies
        working-directory: sdk-typescript
        run: npm ci

      - name: Build SDK
        working-directory: sdk-typescript
        run: npm run build

      - name: Lint SDK
        working-directory: sdk-typescript
        run: npm run lint

      - name: Test SDK
        working-directory: sdk-typescript
        run: npm test

      # Then lint + test portal
      - name: Install portal dependencies
        working-directory: portal
        run: npm ci

      - name: Lint portal
        working-directory: portal
        run: npm run lint

      - name: Test portal
        working-directory: portal
        run: npm test

      - name: Typecheck portal
        working-directory: portal
        run: npx tsc --noEmit

  # ── Lint (Go + Python + Proto) ────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # — Go lint —
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: platform/go.sum

      - name: Go vet
        working-directory: platform
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pinned (not "latest") so a new golangci release can't silently
          # turn a green build red — matches GO_LINT_IMAGE in the Makefile so
          # `make ci` locally == this job. v2 config lives in platform/.golangci.yml.
          version: v2.12.2
          working-directory: platform
          args: --timeout=3m

      # — Python lint —
      # Pin ruff: an unpinned `pipx install ruff` grabs whatever's latest,
      # and each ruff release adds rules + tweaks the formatter, so a green
      # build silently breaks on the next release. 0.15.15 is the version the
      # runner/query sources are clean against (matches the pyproject dev pin).
      - name: Install ruff
        run: pipx install ruff==0.15.15

      - name: Ruff check (runner)
        working-directory: runner
        run: ruff check . && ruff format --check .

      - name: Ruff check (query)
        working-directory: query
        run: ruff check . && ruff format --check .

      # — Proto lint —
      - uses: bufbuild/buf-action@v1
        with:
          input: proto
          setup_only: true

      - name: Buf lint
        working-directory: proto
        run: buf lint

      - name: Buf breaking change detection
        if: github.event_name == 'pull_request'
        working-directory: proto
        run: buf breaking --against "https://github.com/${{ github.repository }}.git#branch=${{ github.base_ref }},subdir=proto"

  # ── Security (secret scan — blocking) ─────────────────────────
  # Just the fast, deterministic secret scan here. The slower dependency
  # vuln scanners (govulncheck / npm audit / pip-audit) are report-only in
  # `make security` and run locally + via Dependabot, to keep CI minutes down.
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: gitleaks secret scan
        run: make security-secrets

  # ── Docs (broken links + env-var coverage — blocking) ─────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: docs-check
        run: make docs-check

  # ── Docker Build (verify all images compile) ──────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build all four service images in parallel using Buildx bake.
      # We only verify they compile — images are not pushed.
      - name: Build ratd (platform)
        uses: docker/build-push-action@v7
        with:
          context: platform
          file: platform/Dockerfile
          push: false
          cache-from: type=gha,scope=ratd
          cache-to: type=gha,mode=max,scope=ratd

      - name: Build runner
        uses: docker/build-push-action@v7
        with:
          context: runner
          file: runner/Dockerfile
          push: false
          cache-from: type=gha,scope=runner
          cache-to: type=gha,mode=max,scope=runner

      - name: Build query
        uses: docker/build-push-action@v7
        with:
          context: query
          file: query/Dockerfile
          push: false
          cache-from: type=gha,scope=query
          cache-to: type=gha,mode=max,scope=query

      - name: Build portal
        uses: docker/build-push-action@v7
        with:
          context: .
          file: portal/Dockerfile
          push: false
          cache-from: type=gha,scope=portal
          cache-to: type=gha,mode=max,scope=portal

  # ── Integration Tests (real Postgres + MinIO) ─────────────────
  # Runs `make test-integration`, which spins up postgres-test + minio-test
  # via infra/docker-compose.test.yml (test profile), then runs the Go
  # postgres/store integration tests against them. Catches regressions in
  # real DB queries that unit tests with in-memory stores cannot.
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-integration-${{ hashFiles('platform/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-integration-
            ${{ runner.os }}-go-

      - name: Run integration tests
        run: make test-integration

      - name: Dump test service logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.test.yml --profile test logs

      - name: Tear down test services
        if: always()
        run: docker compose -f infra/docker-compose.test.yml --profile test down -v

  # ── Example Plugin Tests ──────────────────────────────────────
  # Each plugins/rat-plugin-* directory ships a Makefile with a `test`
  # target that runs `go test ./...` against the plugin (with the platform
  # module mounted via go.mod replace). Without this matrix, plugin tests
  # bit-rot silently — a change to platform's plugin SDK can break every
  # plugin and merge without anyone noticing until a user deploys one.
  test-examples:
    name: Plugin Tests (${{ matrix.plugin }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - rat-plugin-agents
          - rat-plugin-ai-provider
          - rat-plugin-chat
          - rat-plugin-demo-loader
          - rat-plugin-dev-assistant
          - rat-plugin-docs-assistant
          - rat-plugin-event-notifier
          - rat-plugin-interconnect
          - rat-plugin-mcp-docs
          - rat-plugin-mcp-sql
          - rat-plugin-pg-sync
          - rat-plugin-secrets
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # All plugins share the platform module via the local `replace`
      # directive, so caching ~/go/pkg/mod across the matrix is a big win.
      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-plugins-${{ matrix.plugin }}-${{ hashFiles('platform/go.sum', format('plugins/{0}/go.sum', matrix.plugin)) }}
          restore-keys: |
            ${{ runner.os }}-go-plugins-
            ${{ runner.os }}-go-

      - name: Run plugin tests
        working-directory: plugins/${{ matrix.plugin }}
        run: make test
