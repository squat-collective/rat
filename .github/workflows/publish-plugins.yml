# Publish plugin Docker images to GitHub Container Registry.
#
# Triggers:
#   • push to main → publishes `:latest` for every plugin with a Dockerfile.
#   • push of tag `plugin-<name>-v<version>` → publishes `:<version>` for
#     that one plugin (also moves `:latest` to match).
#
# Only Go-based plugins (those that ship a Dockerfile) are published.
# Python-only plugins (dbt-compat, http-source, prql, row-stats, soft-delete)
# are pip-installable extensions of the runner — they don't ship as images.
#
# Builds use Docker BuildKit's --build-context to provide the in-tree
# sdk-go and platform proto sources without publishing them as separate
# Go modules. That keeps the monorepo as the single source of truth while
# still producing self-contained images.

name: Publish Plugins

on:
  push:
    branches: [main]
    tags: ["plugin-*-v*.*.*"]

concurrency:
  group: publish-plugins-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # Discover which plugins to publish based on the trigger.
  #
  # - on main push: every plugin under plugins/ that has a Dockerfile
  # - on tag push: only the plugin named in the tag
  #
  # Outputs a JSON list the next job fans out over.
  discover:
    name: Discover plugins
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.list.outputs.plugins }}
      version: ${{ steps.list.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: list
        name: Build plugin matrix
        run: |
          set -eu
          if [[ "${GITHUB_REF}" == refs/tags/plugin-* ]]; then
            # Tag shape: plugin-<name>-v<version>
            tag="${GITHUB_REF#refs/tags/}"
            rest="${tag#plugin-}"
            version="${rest##*-v}"
            name="${rest%-v${version}}"
            plugins="[\"rat-plugin-${name}\"]"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
          else
            plugins='['
            first=1
            for d in plugins/rat-plugin-*; do
              [[ -f "$d/Dockerfile" ]] || continue
              [[ $first -eq 1 ]] || plugins+=','
              plugins+="\"$(basename "$d")\""
              first=0
            done
            plugins+=']'
            # `latest` is the only tag for main-branch publishes — explicit
            # versions live on git tags only.
            echo "version=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "plugins=${plugins}" >> "$GITHUB_OUTPUT"
          echo "Will publish: ${plugins}"

  build:
    name: Build ${{ matrix.plugin }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.discover.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -eu
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          base="ghcr.io/${owner}/${{ matrix.plugin }}"
          version="${{ needs.discover.outputs.version }}"
          # main-branch builds get :latest + a :sha-<shortsha> for traceability;
          # tag builds get the explicit version + :latest.
          if [[ "${version}" == "latest" ]]; then
            tags="${base}:latest,${base}:sha-${GITHUB_SHA::8}"
          else
            tags="${base}:${version},${base}:latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "Image tags: ${tags}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: plugins/${{ matrix.plugin }}
          file: plugins/${{ matrix.plugin }}/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # The plugin Dockerfiles use --from=platform and --from=sdk-go
          # build contexts so we don't have to copy sdk-go into each
          # plugin dir. Provide them here from the repo root.
          build-contexts: |
            platform=platform
            sdk=sdk-go
          cache-from: type=gha,scope=${{ matrix.plugin }}
          cache-to: type=gha,scope=${{ matrix.plugin }},mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.plugin }}
