# RAT v2 — Documentation Deployment
# Builds the Nextra docs site on every PR that touches docs/website files
# (validation only), and on push to main also deploys to GitHub Pages.
# The PR build is the guard that catches website/dependency breakage BEFORE
# merge — `npm ci` + `npm run build` against the real site.

name: Docs

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "docs/**"
  pull_request:
    paths:
      - "website/**"
      - "docs/**"

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      # Ensure licenses.json exists for the acknowledgments page.
      # If it's already committed, this is a no-op. Otherwise,
      # create a placeholder so the build doesn't fail.
      - name: Ensure licenses data exists
        run: |
          mkdir -p data
          if [ ! -f data/licenses.json ]; then
            echo "[]" > data/licenses.json
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      # Only the push-to-main build feeds a Pages deploy; PR builds are
      # validation only and skip the artifact upload.
      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    # Never deploy from a PR — only from push to main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
